version: "2"

reviews:
  # Auto-review all PRs when opened or updated
  auto_review:
    enabled: true
    drafts: false

  # Review profile — assertive catches more issues, keeps feedback substantive
  profile: "assertive"

  # Collapse walkthrough by default — keeps PR view clean
  collapse_walkthrough: true

  # Abort review on high token usage rather than producing a partial review
  abort_on_context_limit: true

  path_instructions:
    - path: "i2d2/schemas.py"
      instructions: >
        This file defines all kre8 pipeline data contracts — Kit, Kraph, Kanvas.
        Flag any change that weakens Pydantic validation, removes a model_validator,
        relaxes field constraints, or allows raw LLM strings to pass through unvalidated.
        These schemas are architecture boundaries, not implementation details.

    - path: "konnekt/**"
      instructions: >
        konnekt is the sole LLM adapter — all model calls must route through here.
        Flag any direct litellm or provider SDK imports outside this package.
        Flag any hardcoded model strings, API keys, or provider credentials.
        Flag any change that bypasses KonnektError or swallows exceptions silently.

    - path: "i2d2/**"
      instructions: >
        i2d2 is the sole design authority and the only component that writes to katalog.
        Flag any change that introduces design logic outside i2d2, or that has another
        component writing artifacts directly. Flag raw LLM output passed downstream
        without Pydantic validation.

    - path: "stub_tests/**"
      instructions: >
        Stub tests must not make real network calls or require credentials.
        Flag any test that imports or calls live LLM, GCP, or cloud APIs without mocking.
        Flag tests added without corresponding assertions.

  # Do not review these paths
  path_filters:
    - "!**/*.png"
    - "!**/*.svg"
    - "!docs/**"
    - "!*.md"
    - "!.github/**"

chat:
  # Allow CodeRabbit to respond to comments in PRs
  auto_reply: true
